version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bug_classifier_db
    environment:
      POSTGRES_USER: bug_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: bug_classifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bug_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bug_classifier_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bug_classifier_api
    environment:
      DATABASE_URL: postgresql://bug_user:secure_password_123@postgres:5432/bug_classifier
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./saved_models:/app/saved_models
    command: uvicorn serving.main:app --host 0.0.0.0 --port 8000

  prometheus:
    image: prom/prometheus:latest
    container_name: bug_classifier_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: bug_classifier_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bug_classifier_ui
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
